<!DOCTYPE html>
<html>
<head>
    <title>PAN Format Check</title>
    <style>
        body { font-family: Arial; margin: 30px; background-color: #f2f2f2; }
        input, button { padding: 10px; font-size: 16px; }
        .box { background: #fff; padding: 20px; border-radius: 10px; max-width: 400px; }
        .result { margin-top: 20px; font-size: 18px; font-weight: bold; }
        .valid { color: green; }
        .invalid { color: red; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔍 Check PAN Format</h2>

    <form method="POST">
        {% csrf_token %}
        <label for="pan">Enter PAN Number:</label><br>
        <input type="text" name="pan" id="pan" value="{{ pan }}" required /><br><br>
        <button type="submit">Check</button>
    </form>

    {% if result %}
        <div class="result {% if '✅' in result %}valid{% else %}invalid{% endif %}">
            {{ result }}
        </div>
    {% endif %}
</div>

</body>
</html>
